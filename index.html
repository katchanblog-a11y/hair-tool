<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>髪ネタ動画メーカー</title>
<style>
  :root{
    --bg:#1c1a1f; --surface:#27242b; --surface2:#312d36;
    --text:#f2eef0; --sub:#9a939e; --accent:#d9a0b3; --accent-deep:#b3697f;
    --ok:#9fd9b3; --err:#e08a8a; --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;
    padding:16px 14px calc(40px + env(safe-area-inset-bottom));}
  h1{font-size:20px; margin:4px 0 2px; letter-spacing:.04em;}
  h1 .dot{color:var(--accent);}
  .tag{font-size:11px; color:var(--sub); margin-bottom:16px;}
  section{background:var(--surface); border-radius:var(--radius); padding:14px; margin-bottom:14px;}
  section h2{font-size:13px; margin:0 0 10px; color:var(--accent); letter-spacing:.08em; font-weight:600;}
  label{display:block; font-size:12px; color:var(--sub); margin:8px 0 4px;}
  input[type=text], textarea, select{
    width:100%; background:var(--surface2); color:var(--text);
    border:1px solid #3d3844; border-radius:10px; padding:10px 12px;
    font-size:16px; font-family:inherit; outline:none;}
  input:focus, textarea:focus{border-color:var(--accent);}
  textarea{resize:vertical; min-height:44px; line-height:1.5;}
  button{
    appearance:none; border:none; border-radius:12px; padding:13px 16px;
    font-size:15px; font-weight:700; font-family:inherit; width:100%;
    background:var(--accent); color:#2a1e23; margin-top:10px;}
  button.secondary{background:var(--surface2); color:var(--text); border:1px solid #3d3844;}
  button:disabled{opacity:.45;}
  .slide-card{background:var(--surface2); border-radius:10px; padding:10px; margin-bottom:10px; border:1px solid #3d3844;}
  .slide-card.active{border-color:var(--accent);}
  .slide-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;}
  .slide-head b{font-size:12px; color:var(--accent);}
  .slide-head span{font-size:11px; color:var(--sub);}
  .preview-wrap{display:flex; justify-content:center; margin-top:12px;}
  #cv{width:216px; height:384px; border-radius:16px; border:1px solid #3d3844; background:#000;}
  .row{display:flex; gap:8px;}
  .row > *{flex:1;}
  .status{font-size:12px; margin-top:10px; min-height:16px; color:var(--sub); word-break:break-all;}
  .status.ok{color:var(--ok);} .status.err{color:var(--err);}
  progress{width:100%; height:8px; margin-top:8px; accent-color:var(--accent);}
  video{width:216px; border-radius:16px; margin-top:12px; display:block; margin-left:auto; margin-right:auto;}
  a.dl{display:block; text-align:center; margin-top:10px; color:var(--accent); font-weight:700; font-size:15px; text-decoration:none;
    border:1px solid var(--accent); border-radius:12px; padding:12px;}
  .copybox{position:relative;}
  .copybox button{width:auto; padding:8px 14px; font-size:12px; margin-top:8px;}
  .hint{font-size:11px; color:var(--sub); line-height:1.6; margin-top:8px;}
</style>
</head>
<body>

<h1>髪ネタ動画メーカー<span class="dot">.</span></h1>
<div class="tag">質問を入れる → 台本を直す → 動画をつくる。以上。</div>

<!-- 設定 -->
<section>
  <h2>SETTING</h2>
  <label>Worker URL</label>
  <input type="text" id="workerUrl" value="https://tiktok-hair-tool.katchan-blog.workers.dev">
  <div class="row">
    <div>
      <label>スライドの雰囲気</label>
      <select id="theme">
        <option value="beige">サロンベージュ</option>
        <option value="night">ナイト</option>
        <option value="white">クリーンホワイト</option>
      </select>
    </div>
    <div>
      <label>ナレーターの声</label>
      <select id="speaker">
        <option value="3">ずんだもん</option>
        <option value="2">四国めたん</option>
        <option value="8">春日部つむぎ</option>
      </select>
    </div>
  </div>
  <label>肩書き(全スライド上部に固定表示)</label>
  <input type="text" id="badge" value="現役美容師の髪ネタ">
</section>

<!-- 台本生成 -->
<section>
  <h2>1. 台本をつくる</h2>
  <label>お客様に聞かれた質問・髪の悩み</label>
  <textarea id="question" placeholder="例: 白髪って抜いていいの?"></textarea>
  <button id="genScript">台本を生成</button>
  <div class="status" id="scriptStatus"></div>
</section>

<!-- 編集 -->
<section>
  <h2>2. 台本を直す(タップでプレビュー)</h2>
  <div id="slides"></div>
  <div class="preview-wrap"><canvas id="cv" width="720" height="1280"></canvas></div>
</section>

<!-- キャプション -->
<section>
  <h2>3. キャプション</h2>
  <div class="copybox">
    <textarea id="caption" placeholder="台本生成でここにキャプション+ハッシュタグが入ります"></textarea>
    <button class="secondary" id="copyCap">キャプションをコピー</button>
  </div>
</section>

<!-- 動画生成 -->
<section>
  <h2>4. 動画をつくる</h2>
  <button id="genVideo">ナレーション付き動画を生成</button>
  <progress id="prog" value="0" max="100" style="display:none"></progress>
  <div class="status" id="videoStatus"></div>
  <div id="result"></div>
  <div class="hint">
    保存方法: 生成後「動画を保存」をタップ → 共有シートで「ビデオを保存」を選ぶとカメラロールに入ります。<br>
    BGMは投稿時にTikTokアプリ内でつけてください(流行音源が有利)。
  </div>
</section>

<script>
// ============ 状態 ============
const SLIDE_COUNT = 6;
const state = {
  slides: Array(SLIDE_COUNT).fill(""),
  narrs:  Array(SLIDE_COUNT).fill(""),
  active: 0,
};

const THEMES = {
  beige:{ bg:"#f1e8e2", text:"#3a2e2a", accent:"#b0806b", badgeText:"#f7f2ee" },
  night:{ bg:"#221f26", text:"#f5eff2", accent:"#d9a0b3", badgeText:"#2a1e23" },
  white:{ bg:"#ffffff", text:"#26221f", accent:"#c4586e", badgeText:"#ffffff" },
};

// ============ スライド編集UI ============
const slidesEl = document.getElementById("slides");
const NAMES = ["掴み","共感","ポイント①","ポイント②","ポイント③","誘導"];
function buildSlideCards(){
  slidesEl.innerHTML = "";
  for(let i=0;i<SLIDE_COUNT;i++){
    const card = document.createElement("div");
    card.className = "slide-card" + (i===state.active ? " active":"");
    card.innerHTML = `
      <div class="slide-head"><b>スライド${i+1} / ${NAMES[i]}</b><span>タップでプレビュー</span></div>
      <textarea data-type="slide" data-i="${i}" placeholder="テロップ(短く)">${esc(state.slides[i])}</textarea>
      <textarea data-type="narr" data-i="${i}" placeholder="ナレーション(話し言葉)">${esc(state.narrs[i])}</textarea>`;
    card.addEventListener("click", ()=>{ setActive(i); });
    slidesEl.appendChild(card);
  }
}
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;"); }
slidesEl.addEventListener("input", (e)=>{
  const t = e.target;
  if(!t.dataset) return;
  const i = Number(t.dataset.i);
  if(t.dataset.type==="slide") state.slides[i] = t.value;
  if(t.dataset.type==="narr")  state.narrs[i]  = t.value;
  if(i===state.active) drawSlide(ctx, i, 0);
});
function setActive(i){
  state.active = i;
  document.querySelectorAll(".slide-card").forEach((c,idx)=>c.classList.toggle("active", idx===i));
  drawSlide(ctx, i, 0);
}

// ============ Canvas 描画 ============
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
const W=720, H=1280;

function theme(){ return THEMES[document.getElementById("theme").value]; }

function wrapText(c, text, maxW){
  const lines=[]; let line="";
  for(const ch of text){
    if(ch==="\n"){ lines.push(line); line=""; continue; }
    const test = line + ch;
    if(c.measureText(test).width > maxW && line){ lines.push(line); line=ch; }
    else line = test;
  }
  if(line) lines.push(line);
  return lines;
}

// t: 0〜1 (ズーム進行度)
function drawSlide(c, i, t){
  const th = theme();
  c.save();
  // Ken Burns: 全体を少しずつ拡大
  const scale = 1 + 0.06*t;
  c.translate(W/2, H/2); c.scale(scale, scale); c.translate(-W/2, -H/2);

  // 背景
  c.fillStyle = th.bg; c.fillRect(-40,-40,W+80,H+80);

  // 上部の細いアクセントライン
  c.fillStyle = th.accent; c.fillRect(-40, 0, W+80, 10);

  // 肩書きバッジ
  const badge = document.getElementById("badge").value || "";
  if(badge){
    c.font = 'bold 30px "Hiragino Sans", sans-serif';
    const bw = c.measureText(badge).width + 56;
    const bx = (W-bw)/2, by = 90, bh = 62;
    c.fillStyle = th.accent;
    roundRect(c, bx, by, bw, bh, 31); c.fill();
    c.fillStyle = th.badgeText;
    c.textAlign="center"; c.textBaseline="middle";
    c.fillText(badge, W/2, by+bh/2+2);
  }

  // 本文
  const text = state.slides[i] || "(スライド"+(i+1)+")";
  const isHook = (i===0);
  let size = isHook ? 76 : 60;
  c.textAlign="center"; c.textBaseline="middle";
  let lines;
  while(true){
    c.font = `bold ${size}px "Hiragino Sans", sans-serif`;
    lines = wrapText(c, text, W-140);
    if(lines.length*size*1.5 < H*0.5 || size<=40) break;
    size -= 4;
  }
  const lh = size*1.5;
  const startY = H/2 - (lines.length-1)*lh/2;
  c.fillStyle = isHook ? th.accent : th.text;
  lines.forEach((ln,idx)=> c.fillText(ln, W/2, startY + idx*lh));

  // ページドット
  const dotY = H-110;
  for(let d=0; d<SLIDE_COUNT; d++){
    c.beginPath();
    c.arc(W/2 + (d-(SLIDE_COUNT-1)/2)*34, dotY, d===i?9:6, 0, Math.PI*2);
    c.fillStyle = d===i ? th.accent : th.text+"55";
    c.fill();
  }
  c.restore();
}
function roundRect(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath();
}
document.getElementById("theme").addEventListener("change", ()=>drawSlide(ctx, state.active, 0));
document.getElementById("badge").addEventListener("input", ()=>drawSlide(ctx, state.active, 0));

// ============ 台本生成 ============
const scriptStatus = document.getElementById("scriptStatus");
document.getElementById("genScript").addEventListener("click", async ()=>{
  const q = document.getElementById("question").value.trim();
  if(!q){ setStatus(scriptStatus,"質問を入力してください","err"); return; }
  const base = workerBase();
  if(!base) return;
  setStatus(scriptStatus,"台本を生成中...(10秒ほど)","");
  toggleButtons(true);
  try{
    const res = await fetch(base+"/script", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({question:q})
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error + (data.detail?" / "+JSON.stringify(data.detail).slice(0,120):""));
    for(let i=0;i<SLIDE_COUNT;i++){
      state.slides[i] = (data.slides && data.slides[i]) || "";
      state.narrs[i]  = (data.narration && data.narration[i]) || "";
    }
    document.getElementById("caption").value =
      (data.caption||"") + "\n" + ((data.hashtags||[]).join(" "));
    buildSlideCards();
    setActive(0);
    setStatus(scriptStatus,"台本ができました。自由に直してOK","ok");
  }catch(e){
    setStatus(scriptStatus,"エラー: "+e.message,"err");
  }finally{ toggleButtons(false); }
});

// ============ 動画生成 ============
const videoStatus = document.getElementById("videoStatus");
const prog = document.getElementById("prog");
const resultEl = document.getElementById("result");

document.getElementById("genVideo").addEventListener("click", async ()=>{
  const base = workerBase();
  if(!base) return;
  // 使用するスライド(テロップが空でないもの)
  const items = [];
  for(let i=0;i<SLIDE_COUNT;i++){
    if(state.slides[i].trim()) items.push({i, narr: state.narrs[i].trim()});
  }
  if(items.length<2){ setStatus(videoStatus,"スライドが2枚以上必要です","err"); return; }

  toggleButtons(true);
  resultEl.innerHTML="";
  prog.style.display="block"; prog.value=0;

  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AC();
    await audioCtx.resume();

    // 1) ナレーション音声を順に取得
    const speaker = document.getElementById("speaker").value;
    for(let k=0;k<items.length;k++){
      const it = items[k];
      if(it.narr){
        setStatus(videoStatus, `ナレーション生成中 ${k+1}/${items.length} ...`, "");
        const r = await fetch(base+"/tts?speaker="+speaker+"&text="+encodeURIComponent(it.narr.slice(0,200)));
        if(!r.ok) throw new Error("TTS失敗(スライド"+(it.i+1)+")");
        const buf = await r.arrayBuffer();
        it.audio = await audioCtx.decodeAudioData(buf);
      }
      prog.value = Math.round((k+1)/items.length*50);
    }

    // 2) タイムライン構築
    let tcursor = 0.3;
    for(const it of items){
      const aDur = it.audio ? it.audio.duration : 0;
      it.start = tcursor;
      it.dur = Math.max(2.5, aDur + 0.7);
      tcursor += it.dur;
    }
    const total = tcursor + 0.3;

    // 3) ストリーム準備(映像=canvas / 音声=WebAudio)
    const dest = audioCtx.createMediaStreamDestination();
    const stream = new MediaStream([
      ...cv.captureStream(30).getVideoTracks(),
      ...dest.stream.getAudioTracks(),
    ]);
    let mime = "";
    for(const m of ["video/mp4;codecs=avc1", "video/mp4", "video/webm;codecs=vp9", "video/webm"]){
      if(MediaRecorder.isTypeSupported(m)){ mime=m; break; }
    }
    const rec = new MediaRecorder(stream, mime?{mimeType:mime}:undefined);
    const chunks=[];
    rec.ondataavailable = e=>{ if(e.data.size) chunks.push(e.data); };
    const done = new Promise(res=> rec.onstop = res);

    // 4) 録画開始 + 音声スケジュール + 描画ループ
    setStatus(videoStatus, "動画を録画中...("+Math.ceil(total)+"秒待ってください)", "");
    rec.start(500);
    const t0 = audioCtx.currentTime + 0.1;
    for(const it of items){
      if(!it.audio) continue;
      const src = audioCtx.createBufferSource();
      src.buffer = it.audio;
      src.connect(dest);
      src.start(t0 + it.start);
    }
    const startMs = performance.now() + 100;
    await new Promise(resolve=>{
      function frame(){
        const el = (performance.now()-startMs)/1000;
        if(el >= total){ resolve(); return; }
        let cur = items[0];
        for(const it of items){ if(el >= it.start) cur = it; }
        const t = Math.min(1, Math.max(0,(el-cur.start)/cur.dur));
        drawSlide(ctx, cur.i, t);
        prog.value = 50 + Math.round(el/total*50);
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    });
    rec.stop();
    await done;
    audioCtx.close();

    // 5) 出力
    const blob = new Blob(chunks, {type: mime.split(";")[0] || "video/mp4"});
    const url = URL.createObjectURL(blob);
    const ext = mime.includes("mp4") ? "mp4":"webm";
    resultEl.innerHTML = `
      <video src="${url}" controls playsinline></video>
      <a class="dl" href="${url}" download="hair_${Date.now()}.${ext}">動画を保存</a>`;
    prog.value=100;
    setStatus(videoStatus, "完成!("+ext.toUpperCase()+" / "+(blob.size/1024/1024).toFixed(1)+"MB)", "ok");
  }catch(e){
    setStatus(videoStatus, "エラー: "+e.message, "err");
  }finally{
    toggleButtons(false);
    setTimeout(()=>{ prog.style.display="none"; }, 1500);
  }
});

// ============ 共通 ============
function workerBase(){
  let u = document.getElementById("workerUrl").value.trim();
  if(!u){ alert("Worker URLを入れてください"); return null; }
  return u.replace(/\/+$/,"");
}
function setStatus(el,msg,cls){ el.textContent=msg; el.className="status "+(cls||""); }
function toggleButtons(dis){
  document.getElementById("genScript").disabled=dis;
  document.getElementById("genVideo").disabled=dis;
}
document.getElementById("copyCap").addEventListener("click", async ()=>{
  const t = document.getElementById("caption").value;
  try{ await navigator.clipboard.writeText(t); setStatus(scriptStatus,"","");
    document.getElementById("copyCap").textContent="コピーしました!";
    setTimeout(()=>document.getElementById("copyCap").textContent="キャプションをコピー",1500);
  }catch(e){ alert("コピーできませんでした。手動で選択してください"); }
});

// 初期化
buildSlideCards();
drawSlide(ctx, 0, 0);
</script>
</body>
</html>
